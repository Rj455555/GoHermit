<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>GoHermit</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="app" class="app-shell">
    <aside class="icon-rail" aria-label="工具栏">
      <button id="brand-button" class="rail-button brand-button" aria-label="新建任务"><span>G</span></button>
      <button id="tasks-button" class="rail-button active" aria-label="任务"><span>◫</span></button>
      <div class="rail-spacer"></div>
      <span id="health-dot" class="health-dot" title="正在连接"></span>
      <button id="settings-button" class="rail-button" data-testid="nav-settings" aria-label="设置"><span>⚙</span></button>
    </aside>

    <aside id="task-sidebar" class="task-sidebar">
      <header class="sidebar-head">
        <div><strong>GoHermit</strong><span id="version">—</span></div>
        <button id="sidebar-close" class="icon-button mobile-only" aria-label="关闭任务列表">×</button>
      </header>
      <button id="new-task" class="new-task-button"><span>＋</span> 新建任务</button>
      <div class="sidebar-label"><span>任务</span><span id="session-count">0</span></div>
      <div id="session-list" class="session-list"></div>
      <footer class="sidebar-footer">
        <div class="service-line"><span id="service-dot"></span><span id="service-status">正在连接</span></div>
        <div id="workspace" class="workspace-path" title="当前工作区">—</div>
      </footer>
    </aside>

    <main class="workspace">
      <header class="thread-header">
        <button id="sidebar-open" class="icon-button mobile-only" aria-label="打开任务列表">☰</button>
        <div class="thread-identity">
          <h1 id="thread-title">新任务</h1>
          <p id="thread-meta">选择模型，然后告诉 GoHermit 需要完成什么</p>
        </div>
        <div class="thread-actions">
          <span id="run-status" class="run-status">就绪</span>
          <button id="resume-run" class="subtle-button hidden">恢复</button>
          <button id="cancel-run" class="subtle-button danger-text hidden">停止</button>
        </div>
      </header>

      <section id="thread" class="thread empty-thread">
        <div id="welcome" class="welcome">
          <div class="welcome-mark">G</div>
          <h2>今天想构建什么？</h2>
          <p>GoHermit 会读取项目、修改代码、运行测试，并保存可恢复的工作状态。</p>
        </div>
        <div id="messages" class="messages"></div>
        <details id="activity-panel" class="activity-panel hidden">
          <summary><span class="activity-chevron">›</span> 运行活动 <span id="activity-count" class="activity-count">0</span></summary>
          <div id="events" class="events"></div>
        </details>
      </section>

      <footer class="composer-wrap">
        <div id="composer" class="composer">
          <textarea id="task" maxlength="16384" aria-label="任务消息" placeholder="描述任务，或继续当前会话…"></textarea>
          <div class="composer-footer">
            <div id="new-task-options" class="model-pickers">
              <label><span class="sr-only">公司</span><select id="company" aria-label="公司"></select></label>
              <label><span class="sr-only">接入方式</span><select id="access" aria-label="接入方式"></select></label>
              <label><span class="sr-only">模型</span><select id="model" aria-label="模型"></select></label>
              <label><span class="sr-only">Agent</span><select id="agent" aria-label="Agent"></select></label>
            </div>
            <div id="session-model" class="session-model hidden"></div>
            <div class="composer-actions">
              <span class="shortcut">Ctrl ↵</span>
              <button id="send" class="send-button" aria-label="发送">↑</button>
            </div>
          </div>
        </div>
        <p id="composer-note" class="composer-note">模型可能出错，请检查重要改动。</p>
      </footer>
    </main>

    <div id="drawer-backdrop" class="drawer-backdrop hidden"></div>
    <aside id="settings-drawer" class="settings-drawer hidden" aria-label="设置">
      <header class="drawer-head"><div><h2>设置</h2><p>模型接入与凭据</p></div><button id="settings-close" class="icon-button" aria-label="关闭设置">×</button></header>
      <div class="settings-intro"><strong>模型接入</strong><p>未登录或未设置 Key 的接入方式不会出现在新任务中。凭据只保存在服务端。</p></div>
      <div id="settings-list" class="settings-list"></div>
    </aside>
  </div>
  <div id="toast" role="status" aria-live="polite"></div>
  <script src="/app.js" defer></script>
</body>
</html>
