<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>GoHermit Lab</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main>
    <header>
      <div><span class="eyebrow">LOCAL AGENT LAB</span><h1>GoHermit</h1></div>
      <span id="health" class="pill muted">连接中</span>
    </header>

    <section class="config-card">
      <div class="section-title">
        <div><span class="step">01</span><h2>选择运行配置</h2></div>
        <span class="section-help">厂商 → 接入方式 → 模型 → Agent</span>
      </div>
      <div class="config-grid">
        <label><span>模型厂商</span><select id="company" data-testid="company-select"></select></label>
        <label><span>接入方式</span><select id="access" data-testid="access-select"></select></label>
        <label><span>模型</span><select id="model" data-testid="model-select"></select></label>
        <label><span>Agent</span><select id="agent" data-testid="agent-select"></select></label>
      </div>
      <div class="selection-status">
        <div><span class="label">通道</span><strong id="channel">—</strong></div>
        <div><span class="label">协议</span><strong id="protocol">—</strong></div>
        <div><span class="label">认证</span><strong id="key">—</strong></div>
        <p id="access-note">正在读取服务端能力。</p>
      </div>
    </section>

    <section class="composer">
      <div class="section-title"><div><span class="step">02</span><h2>交给 Agent</h2></div></div>
      <label class="sr-only" for="task">开发任务</label>
      <textarea id="task" maxlength="16384" placeholder="例如：检查项目结构，运行测试并修复失败用例。"></textarea>
      <div class="actions"><span id="hint">配置来自浏览器，密钥始终只在服务端读取。</span><button id="run">开始运行</button></div>
    </section>

    <section class="activity">
      <div class="activity-title"><div><span class="step">03</span><h2>实时事件</h2></div><button id="clear" class="ghost">清空</button></div>
      <div id="events" class="events"><p class="empty">尚未运行任务。</p></div>
    </section>
  </main>
  <script src="/app.js" defer></script>
</body>
</html>
