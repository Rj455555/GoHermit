services:
  gohermit-web:
    build:
      context: .
      args:
        GO_IMAGE: "${GOHERMIT_GO_IMAGE:-golang:1.26-bookworm}"
    user: "${GOHERMIT_UID:-501}:${GOHERMIT_GID:-20}"
    ports:
      - "${GOHERMIT_WEB_BIND:-127.0.0.1}:${GOHERMIT_WEB_PORT:-8787}:8787"
    environment:
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
      DASHSCOPE_API_KEY: "${DASHSCOPE_API_KEY:-}"
      ALIBABA_CODING_PLAN_API_KEY: "${ALIBABA_CODING_PLAN_API_KEY:-}"
      KIMI_API_KEY: "${KIMI_API_KEY:-}"
      CODEX_HOME: "/codex"
      GOHERMIT_AUTH_STORE: "/data/auth.json"
      GOHERMIT_OWNER_STORE: "/data/owner.json"
    volumes:
      - "${GOHERMIT_WORKSPACE:-./sandbox}:/workspace"
      - "${GOHERMIT_CONFIG:-./configs/codex.toml}:/config/hermit.toml:ro"
      - "${HOME}/.codex:/codex:ro"
      - "gohermit-data:/data"
    init: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "hermit", "version"]
      interval: 15s
      timeout: 3s
      retries: 3

volumes:
  gohermit-data:
